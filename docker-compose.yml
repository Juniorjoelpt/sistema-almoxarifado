version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: almoxarifado_mysql
    restart: unless-stopped

    env_file:
      - .env

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - almox

  backend:
    build:
      context: ./backend

    container_name: almoxarifado_backend
    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      - mysql

    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

    volumes:
      - uploads:/app/uploads

    ports:
      - "8080:8080"

    networks:
      - almox

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "https://msalmoxarife.tech"

    container_name: almoxarifado_frontend
    restart: unless-stopped

    depends_on:
      - backend

    expose:
      - "80"

    networks:
      - almox

  caddy:
    image: caddy:2

    container_name: almoxarifado_caddy
    restart: unless-stopped

    depends_on:
      - frontend
      - backend

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

    networks:
      - almox

volumes:
  mysql_data:
  uploads:
  caddy_data:
  caddy_config:

networks:
  almox:
    driver: bridge

